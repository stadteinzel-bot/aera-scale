<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" fill="none">
  <!-- Dark green background pill -->
  <rect x="0" y="0" width="320" height="80" rx="8" fill="#0D2818"/>

  <!-- Icon Mark -->
  <g transform="translate(16, 8)">
    <rect x="8" y="24" width="6" height="40" fill="#C9A84C"/>
    <rect x="50" y="24" width="6" height="40" fill="#C9A84C"/>
    <polygon points="11,24 32,4 35,4 35,10 14,28" fill="#C9A84C"/>
    <polygon points="53,24 32,4 29,4 29,10 50,28" fill="#C9A84C"/>
    <rect x="17" y="36" width="30" height="5" fill="#C9A84C"/>
  </g>

  <!-- Divider -->
  <rect x="90" y="18" width="1" height="44" fill="#C9A84C" opacity="0.4"/>

  <!-- Wordmark -->
  <text
    x="104"
    y="40"
    font-family="'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="22"
    font-weight="700"
    letter-spacing="3"
    fill="#FFFFFF"
  >AERA SCALE</text>

  <!-- Sub-label -->
  <text
    x="106"
    y="58"
    font-family="'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="8"
    font-weight="400"
    letter-spacing="2.5"
    fill="#C9A84C"
  >PROPERTY OPERATING SYSTEM</text>
</svg>
